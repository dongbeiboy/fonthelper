name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Update version from tag
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          $csproj = "src/TOfont.WinUI/TOfont.WinUI.csproj"
          (Get-Content $csproj) -replace '<Version>.*</Version>', "<Version>$version</Version>" | Set-Content $csproj
          echo "Version updated to: $version"

      - name: Publish
        run: dotnet publish src/TOfont.WinUI/TOfont.WinUI.csproj -c Release -r win-x64 --self-contained -p:DebugType=None -p:DebugSymbols=false -o publish

      - name: Clean unnecessary files
        run: |
          Remove-Item -Path publish/*.pdb -Force -ErrorAction SilentlyContinue
          Remove-Item -Path publish/*.deps.json -Force -ErrorAction SilentlyContinue
          Remove-Item -Path publish/*.runtimeconfig.json -Force -ErrorAction SilentlyContinue

      - name: Pack to folder and zip
        run: |
          mkdir TOfont
          Move-Item -Path publish/* -Destination TOfont/
          Compress-Archive -Path TOfont -DestinationPath TOfont-win-x64.zip -CompressionLevel Optimal

      - name: Get changelog
        id: changelog
        run: |
          $prevTag = git describe --tags --abbrev=0 HEAD^ 2>$null
          if ($prevTag) {
            $log = git log "$prevTag..HEAD" --pretty=format:"- %s" --no-merges
          } else {
            $log = git log --pretty=format:"- %s" --no-merges -10
          }
          $log | Out-File -FilePath changelog.md -Encoding utf8
          echo "changelog<<EOF" >> $env:GITHUB_OUTPUT
          Get-Content changelog.md >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: TOfont-win-x64.zip
          body: ${{ steps.changelog.outputs.changelog }}
