name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish src/TOfont.WinUI/TOfont.WinUI.csproj -c Release -r win-x64 --self-contained -p:DebugType=None -p:DebugSymbols=false -o publish

      - name: Zip
        run: Compress-Archive -Path publish/* -DestinationPath TOfont-win-x64.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: TOfont-win-x64.zip
