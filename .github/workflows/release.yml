name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish src/TOfont.WinUI/TOfont.WinUI.csproj -c Release -r win-x64 --self-contained -p:DebugType=None -p:DebugSymbols=false -o publish

      - name: Clean unnecessary files
        run: |
          Remove-Item -Path publish/*.pdb -Force -ErrorAction SilentlyContinue
          Remove-Item -Path publish/*.deps.json -Force -ErrorAction SilentlyContinue
          Remove-Item -Path publish/*.runtimeconfig.json -Force -ErrorAction SilentlyContinue

      - name: Pack to folder and zip
        run: |
          mkdir TOfont
          Move-Item -Path publish/* -Destination TOfont/
          Compress-Archive -Path TOfont -DestinationPath TOfont-win-x64.zip -CompressionLevel Optimal

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: TOfont-win-x64.zip
